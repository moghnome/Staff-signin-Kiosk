<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Out</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    height:100vh;
}

/* LEFT IMAGE */
.left {
    width: 50%;
    background: url("{{ url_for('static', filename='ESECjunior-playground.png') }}") no-repeat center;
    background-size: cover;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    background: linear-gradient(135deg, #c62828, #e53935);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 90px;
}

/* BOX */
.box {
    background: white;
    padding: 40px 30px;
    border-radius: 12px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    color: #333;
    margin-bottom: 10px;
}

p {
    color: #666;
    font-size: 14px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #c62828;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #a61c1c;
}

/* BOTTOM NAV */
.bottom-left {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

.bottom-left button {
    display:block;
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.btn-grey { background: grey; color:white; }
.btn-dark { background: #333; color:white; }
.btn-red { background: #c62828; color:white; }

.btn-grey:hover { background:#555; }
.btn-dark:hover { background:#000; }
.btn-red:hover { background:#a61c1c; }

/* MOBILE */
@media (max-width: 768px){
    .left{ display:none; }
    .right{ width:100%; }
}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="box">

    <h2>Sign Out</h2>
    <p>Please enter your Email or Mobile to Sign Out</p>

    {% if request.args.get('msg') == 'already' %}
        <div style="color:red;font-weight:bold;margin-bottom:10px;">
            Already signed out or not signed in
        </div>
    {% endif %}

    {% if request.args.get('msg') == 'notfound' %}
        <div style="color:red;font-weight:bold;margin-bottom:10px;">
            User not found
        </div>
    {% endif %}

    <form method="POST" action="/logout">
        <input type="text" name="login_id" placeholder="Email or Mobile" required>
        <button type="submit">Confirm Sign Out</button>
    </form>

</div>

</div>

<!-- NAV -->
<div class="bottom-left">

    <a href="/"><button class="btn-grey">⬅ Back</button></a>
    <a href="/next"><button class="btn-red">➡ Next Visitor</button></a>
    <a href="/signout"><button class="btn-dark">🔄 Refresh</button></a>

</div>

<script>
let timeout;

function resetTimer(){
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        window.location.href = "/";
    }, 30000);
}

window.onload = resetTimer;
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.onclick = resetTimer;
document.ontouchstart = resetTimer;
</script>

</body>
</html>
