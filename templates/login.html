<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    display:flex;
    min-height:100vh;
    overflow-x:hidden;
}

/* LEFT SIDE */
.left{
    width:50%;
    background:url("{{ url_for('static', filename='ESEC images.jpg') }}") no-repeat center;
    background-size:cover;
}

/* RIGHT SIDE */
.right{
    width:50%;
    background:linear-gradient(135deg,#c62828,#e53935);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:20px;
}

/* LOGO */
.logo{
    position:absolute;
    top:20px;
    left:20px;
    width:90px;
    max-width:25vw;
    z-index:2;
}

/* LOGIN BOX */
.box{
    background:white;
    padding:40px 30px;
    border-radius:12px;
    width:100%;
    max-width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    z-index:2;
}

h2{
    margin-bottom:15px;
    color:#333;
}

/* INPUTS */
input,
button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BUTTON */
button{
    background:#c62828;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#a61c1c;
}

/* ERROR */
.error{
    color:red;
    font-weight:bold;
    margin-bottom:10px;
}

/* LINK */
a{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:#c62828;
    font-weight:500;
}

/* ================= MOBILE + TABLET ================= */
@media (max-width: 900px){

    body{
        flex-direction:column;
    }

    /* KEEP IMAGE BACKGROUND */
    .left{
        display:block;
        width:100%;
        height:35vh;
        background:url("{{ url_for('static', filename='ESEC images.jpg') }}") no-repeat center;
        background-size:cover;
    }

    .right{
        width:100%;
        min-height:65vh;
        padding:90px 20px 30px;
    }

    .logo{
        width:70px;
        top:15px;
        left:15px;
    }

    .box{
        width:100%;
        max-width:420px;
        padding:35px 25px;
    }

    h2{
        font-size:28px;
    }

    input,
    button{
        font-size:16px;
        padding:14px;
    }
}

/* EXTRA SMALL DEVICES */
@media (max-width: 480px){

    .left{
        height:30vh;
    }

    .box{
        padding:28px 20px;
    }

    h2{
        font-size:24px;
    }

    input,
    button{
        font-size:15px;
    }
}

</style>

</head>

<body>

<div class="left"></div>

<div class="right">

<img
    src="{{ url_for('static', filename='logo.png') }}"
    class="logo"
    alt="Logo"
>

<div class="box">

<h2>Welcome Back</h2>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="/login">

<input
    type="text"
    name="login_id"
    id="login_id"
    placeholder="Email or Mobile"
    required
>

<!-- ADMIN PIN -->
<input
    type="password"
    name="pin"
    id="pin"
    placeholder="Enter Admin PIN"
    style="display:none;"
>

<!-- GPS -->
<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<button type="submit">
    Sign In
</button>

</form>

<a href="/get-started">
    ← Back
</a>

</div>
</div>

<script>

const adminEmail = "dl.1415.info@schools.sa.edu.au";

document.getElementById("login_id").addEventListener("input", function () {

    const pin = document.getElementById("pin");

    if (this.value.trim().toLowerCase() === adminEmail) {

        pin.style.display = "block";

    } else {

        pin.style.display = "none";
        pin.value = "";
    }
});


// ================= GPS =================
if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(

        function(position){

            document.getElementById("latitude").value =
                position.coords.latitude;

            document.getElementById("longitude").value =
                position.coords.longitude;
        },

        function(error){

            console.log("Location permission denied");
        }

    );
}

// ================= AUTO TIMEOUT =================
let timeout;

function resetTimer(){

    clearTimeout(timeout);

    timeout = setTimeout(function(){

        window.location.href = "/";

    }, 30000);
}

window.onload = resetTimer;

document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.onclick = resetTimer;
document.ontouchstart = resetTimer;

</script>

</body>
</html>
