<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    display:flex;
    height:100vh;
}

.left{
    width:50%;
    background:url("{{ url_for('static', filename='ESEC images.jpg') }}") no-repeat center;
    background-size:cover;
}

.right{
    width:50%;
    background:linear-gradient(135deg,#c62828,#e53935);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.logo{
    position:absolute;
    top:20px;
    left:20px;
    width:90px;
}

.box{
    background:white;
    padding:40px 30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    background:#c62828;
    color:white;
    border:none;
    cursor:pointer;
}

.error{color:red;font-weight:bold;margin-bottom:10px;}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="box">

<h2>Welcome Back</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/login">

<input type="text" name="login_id" id="login_id" placeholder="Email or Mobile" required>

<!-- ADMIN PIN -->
<input type="password" name="pin" id="pin" placeholder="Enter Admin PIN" style="display:none;">

<!-- GPS (RESTORED) -->
<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<button type="submit">Sign In</button>

</form>

<a href="/get-started">← Back</a>

</div>
</div>

<script>
const adminEmail = "dl.1415.info@schools.sa.edu.au";

document.getElementById("login_id").addEventListener("input", function () {

    const pin = document.getElementById("pin");

    if (this.value.trim().toLowerCase() === adminEmail) {
        pin.style.display = "block";
    } else {
        pin.style.display = "none";
        pin.value = "";
    }
});

// ================= GPS (RESTORED FULL BEHAVIOR) =================
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        function(position){
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
        },
        function(error){
            console.log("Location permission denied");
        }
    );
}
</script>

</body>
</html>
