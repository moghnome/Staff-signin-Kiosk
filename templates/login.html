<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display:flex;
            height:100vh;
        }

        /* LEFT SIDE */
        .left{
            width:50%;
            background:url("{{ url_for('static', filename='ESEC_images.jpg') }}") no-repeat center;
            background-size:cover;
        }

        /* RIGHT SIDE */
        .right{
            width:50%;
            background:linear-gradient(135deg, #c62828, #e53935);
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* LOGO */
        .logo{
            position:absolute;
            top:20px;
            left:20px;
            width:90px;
        }

        /* LOGIN BOX */
        .box{
            background:white;
            padding:40px 30px;
            border-radius:12px;
            text-align:center;
            width:320px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:15px;
            color:#333;
        }

        .error{
            color:red;
            font-weight:bold;
            margin-bottom:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            background:#c62828;
            color:white;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
        }

        button:hover{
            background:#a61c1c;
        }

        a{
            display:block;
            margin-top:15px;
            color:#c62828;
            text-decoration:none;
        }

        @media (max-width:768px){

            .left{
                display:none;
            }

            .right{
                width:100%;
            }

            .box{
                width:90%;
            }
        }

    </style>

</head>

<body>

    <div class="left"></div>

    <div class="right">

        <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
            alt="Logo"
        >

        <div class="box">

            <h2>Welcome Back</h2>

            <!-- ERROR -->
            {% if error %}
                <div class="error">
                    {{ error }}
                </div>
            {% endif %}

            <!-- LOGIN FORM -->
            <form method="POST" action="{{ url_for('login') }}">

                <input
                    type="text"
                    id="login_id"
                    name="login_id"
                    placeholder="Email or Mobile"
                    required
                >

                <!-- ADMIN PIN -->
                <input
                    type="password"
                    id="pin"
                    name="pin"
                    placeholder="Enter Admin PIN"
                    style="display:none;"
                >

                <!-- GPS -->
                <input type="hidden" name="latitude" id="latitude">
                <input type="hidden" name="longitude" id="longitude">

                <button type="submit">
                    Sign In
                </button>

            </form>

            <a href="/get-started">
                ← Back
            </a>

        </div>

    </div>

    <!-- ADMIN PIN SCRIPT -->
    <script>

        const adminEmail = "dl.1415.info@schools.sa.edu.au";

        const loginInput = document.getElementById("login_id");
        const pinInput = document.getElementById("pin");

        loginInput.addEventListener("input", function () {

            if (loginInput.value.trim().toLowerCase() === adminEmail) {

                pinInput.style.display = "block";
                pinInput.required = true;

            } else {

                pinInput.style.display = "none";
                pinInput.required = false;
                pinInput.value = "";
            }

        });

    </script>

    <!-- GEOLOCATION -->
    <script>

        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(

                function(position){

                    document.getElementById("latitude").value =
                        position.coords.latitude;

                    document.getElementById("longitude").value =
                        position.coords.longitude;
                },

                function(error){

                    console.log("Location access denied.");
                }

            );
        }

    </script>

    <!-- AUTO REDIRECT -->
    <script>

        let timeout;

        function resetTimer(){

            clearTimeout(timeout);

            timeout = setTimeout(function(){

                window.location.href = "/";

            }, 30000);

        }

        window.addEventListener("load", resetTimer);
        document.addEventListener("mousemove", resetTimer);
        document.addEventListener("keypress", resetTimer);
        document.addEventListener("click", resetTimer);
        document.addEventListener("touchstart", resetTimer);

    </script>

</body>

</html>
