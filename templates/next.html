<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
        }

        .left {
            width: 50%;
            background: url("{{ url_for('static', filename='Outsideimages.jpg') }}") no-repeat center;
            background-size: cover;
        }

        .right {
            width: 50%;
            background: linear-gradient(135deg, #c62828, #e53935);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 90px;
        }

        .box {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin: 5px 0;
        }

        .timer {
            font-size: 13px;
            color: #999;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #c62828;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #a61c1c;
        }

        a {
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .left {
                display: none;
            }

            .right {
                width: 100%;
            }

            .box {
                width: 90%;
            }
        }
    </style>

    <script>
        let timeout;

        function resetTimer() {
            clearTimeout(timeout);
            timeout = setTimeout(function () {
                window.location.href = "/";
            }, 30000);
        }

        window.addEventListener("load", resetTimer);
        document.addEventListener("mousemove", resetTimer);
        document.addEventListener("keypress", resetTimer);
        document.addEventListener("click", resetTimer);
        document.addEventListener("touchstart", resetTimer);
    </script>

</head>

<body>

    <div class="left"></div>

    <div class="right">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">

        <div class="box">

            <h2>Thank You</h2>

            <p>Please proceed to the next visitor.</p>

            <p class="timer">Or return to the Home Page...</p>

            <a href="/returning">
                <button>➡ Next Visitor</button>
            </a>

            <a href="/">
                <button>⬅ Back to Home</button>
            </a>

        </div>

    </div>

</body>

</html>
