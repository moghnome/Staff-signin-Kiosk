<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Segoe UI";
    display:flex;
    height:100vh;
}

.left{
    width:50%;
    background:url("{{ url_for('static', filename='ESEC_images.jpg') }}") center/cover;
}

.right{
    width:50%;
    background:linear-gradient(135deg,#c62828,#e53935);
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#fff;
    padding:40px;
    border-radius:10px;
    width:320px;
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    background:#c62828;
    color:white;
    border:none;
}

.error{color:red;margin-bottom:10px;}
.logo{position:absolute;top:20px;left:20px;width:80px;}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="box">

<h2>Login</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/login">

<input type="text" name="login_id" id="login_id" placeholder="Email or Mobile" required>

<input type="password" name="pin" id="pin" placeholder="Admin PIN" style="display:none;">

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<button type="submit">Sign In</button>

</form>

<a href="/get-started">Back</a>

</div>
</div>

<script>
const adminEmail = "dl.1415.info@schools.sa.edu.au";

document.getElementById("login_id").addEventListener("input", function(){
    let pin = document.getElementById("pin");
    if(this.value.toLowerCase() === adminEmail){
        pin.style.display = "block";
    } else {
        pin.style.display = "none";
        pin.value = "";
    }
});

navigator.geolocation.getCurrentPosition(function(pos){
    document.getElementById("latitude").value = pos.coords.latitude;
    document.getElementById("longitude").value = pos.coords.longitude;
});
</script>

</body>
</html>
</html>
